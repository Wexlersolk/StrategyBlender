# StrategyBlender Configuration
project:
  name: "StrategyBlender"
  version: "0.1.0"
  environment: "development"
  log_level: "INFO"

database:
  postgresql:
    host: "localhost"
    port: 5432
    database: "strategyblender"
    username: "trader"
    password: "password123"
    pool_size: 20
  redis:
    host: "localhost"
    port: 6379
    db: 0

trading:
  account:
    initial_capital: 100000
    currency: "USD"
    broker: "IC_Markets"
    leverage: 30
  risk:
    max_portfolio_risk: 0.25
    max_strategy_risk: 0.05
    max_daily_loss: -0.02
    stop_loss_atr_multiplier: 2.0
  execution:
    allocation_frequency: 300  # seconds
    order_timeout: 30
    slippage_tolerance: 0.0001

strategies:
  - id: "trend_follower_1"
    name: "Trend Following MA"
    source: "metatrader5"
    enabled: true
    parameters:
      fast_ma: 20
      slow_ma: 50
      atr_period: 14
    allocation:
      min_weight: 0.05
      max_weight: 0.40
    files:
      signal_file: "/home/trader/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Files/signals.json"
      order_file: "/home/trader/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Files/orders.json"
      
  - id: "mean_reversion_1"
    name: "RSI Mean Reversion"
    source: "python"
    enabled: true
    parameters:
      rsi_period: 14
      oversold: 30
      overbought: 70
    script_path: "./scripts/mean_reversion.py"

ml:
  regime_detection:
    update_frequency: 60  # seconds
    history_days: 30
    features:
      - "trend_strength"
      - "volatility"
      - "volume_profile"
      - "market_breadth"
  models:
    retrain_frequency: 86400  # daily
    save_path: "./models/"

monitoring:
  dashboard:
    port: 8501
    host: "0.0.0.0"
  logging:
    file: "./logs/strategyblender.log"
    max_size_mb: 100
    backup_count: 5
  alerts:
    telegram_bot_token: ""
    telegram_chat_id: ""
